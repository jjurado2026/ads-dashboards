<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Harmonices — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #143B48;
      --color-primary-light: #1E5A6B;
      --color-bg: #FFFFFF;
      --color-card-bg: #FFFFFF;
      --color-text: #1A1A1A;
      --color-text-muted: #6B7280;
      --color-meta: #1877F2;
      --color-google: #34A853;
      --color-hubspot: #FF7A59;
      --color-historico: #8B7355;
      --font-family: 'Montserrat', sans-serif;
      --border-radius: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }

    body {
      font-family: var(--font-family);
      background: linear-gradient(135deg, #EBF0F2 0%, #D9E2E6 50%, #E4EAED 100%);
      background-attachment: fixed;
      color: var(--color-text);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .landing-wrapper { max-width: 800px; width: 100%; padding: 40px 32px; text-align: center; }
    .landing-logo { margin-bottom: 8px; }
    .landing-logo img { height: 80px; }
    .landing-brand { font-size: 2.4rem; font-weight: 800; color: var(--color-primary); margin-bottom: 4px; }
    .landing-subtitle { font-size: 1rem; color: var(--color-text-muted); font-weight: 500; margin-bottom: 12px; }
    .landing-month-row { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 40px; }
    .landing-month-label { font-size: 0.85rem; font-weight: 600; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .month-selector { padding: 8px 16px; border: 2px solid var(--color-primary); border-radius: 6px; background: var(--color-card-bg); color: var(--color-text); font-family: var(--font-family); font-size: 0.9rem; font-weight: 600; cursor: pointer; }

    .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .nav-card { background: var(--color-card-bg); border-radius: var(--border-radius); padding: 32px 24px; text-decoration: none; color: var(--color-text); box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: transform 0.25s ease, box-shadow 0.25s ease; display: flex; flex-direction: column; align-items: center; gap: 14px; border-top: 5px solid var(--color-primary); position: relative; overflow: hidden; }
    .nav-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 0; transition: height 0.25s ease; opacity: 0.04; }
    .nav-card:hover { transform: translateY(-6px); box-shadow: 0 12px 32px rgba(0,0,0,0.14); }
    .nav-card:hover::after { height: 100%; }
    .nav-card.google { border-top-color: var(--color-google); }
    .nav-card.google::after { background: var(--color-google); }
    .nav-card.meta { border-top-color: var(--color-meta); }
    .nav-card.meta::after { background: var(--color-meta); }
    .nav-card.historico { border-top-color: var(--color-historico); }
    .nav-card.historico::after { background: var(--color-historico); }
    .nav-card.hubspot { border-top-color: var(--color-hubspot); }
    .nav-card.hubspot::after { background: var(--color-hubspot); }

    .nav-card-icon { width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; transition: transform 0.25s ease; }
    .nav-card:hover .nav-card-icon { transform: scale(1.1); }
    .nav-card-icon svg { width: 48px; height: 48px; }
    .nav-card-icon img { height: 48px; width: auto; }
    .nav-card-title { font-size: 1.1rem; font-weight: 700; }
    .nav-card-desc { font-size: 0.82rem; color: var(--color-text-muted); line-height: 1.4; }
    .landing-footer { margin-top: 48px; font-size: 0.8rem; color: var(--color-text-muted); }

    @media (max-width: 600px) {
      .nav-grid { grid-template-columns: 1fr; }
      .landing-brand { font-size: 1.8rem; }
      .landing-logo img { height: 60px; }
    }
  </style>
</head>
<body>
  <div class="landing-wrapper">
    <div class="landing-logo"><img src="../assets/harmonices-logo.png" alt="Harmonices"></div>
    <div class="landing-brand">Harmonices</div>
    <div class="landing-subtitle">Dashboard de Publicidad Digital</div>

    <div class="landing-month-row">
      <span class="landing-month-label">Mes:</span>
      <select id="month-selector" class="month-selector"></select>
    </div>

    <div class="nav-grid">
      <a href="google.html" class="nav-card google" id="link-google">
        <div class="nav-card-icon">
          <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
            <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
            <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0124 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
            <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 01-4.087 5.571l.001-.001 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
          </svg>
        </div>
        <div class="nav-card-title">Google Ads</div>
        <div class="nav-card-desc">KPIs, tendencias diarias, campañas y keywords</div>
      </a>
      <a href="meta.html" class="nav-card meta" id="link-meta">
        <div class="nav-card-icon">
          <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path fill="#1877F2" d="M24 4C12.954 4 4 12.954 4 24c0 9.983 7.314 18.257 16.875 19.757V29.5h-5.078V24h5.078v-4.191c0-5.013 2.986-7.784 7.554-7.784 2.189 0 4.478.39 4.478.39v4.922h-2.522c-2.485 0-3.26 1.542-3.26 3.123V24h5.547l-.887 5.5h-4.66v14.257C36.686 42.257 44 33.983 44 24c0-11.046-8.954-20-20-20z"/>
          </svg>
        </div>
        <div class="nav-card-title">Meta Ads</div>
        <div class="nav-card-desc">KPIs, campañas, plataformas y creatividades</div>
      </a>
      <a href="historico.html" class="nav-card historico" id="link-historico">
        <div class="nav-card-icon">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="6" y="10" width="36" height="30" rx="3" stroke="#8B7355" stroke-width="3" fill="none"/>
            <line x1="6" y1="18" x2="42" y2="18" stroke="#8B7355" stroke-width="3"/>
            <line x1="16" y1="10" x2="16" y2="6" stroke="#8B7355" stroke-width="3" stroke-linecap="round"/>
            <line x1="32" y1="10" x2="32" y2="6" stroke="#8B7355" stroke-width="3" stroke-linecap="round"/>
            <rect x="12" y="23" width="5" height="12" rx="1" fill="#8B7355" opacity="0.4"/>
            <rect x="21.5" y="27" width="5" height="8" rx="1" fill="#8B7355" opacity="0.6"/>
            <rect x="31" y="24" width="5" height="11" rx="1" fill="#8B7355" opacity="0.8"/>
          </svg>
        </div>
        <div class="nav-card-title">Histórico</div>
        <div class="nav-card-desc">Evolución mensual de Google Ads y Meta Ads</div>
      </a>
      <a href="hubspot.html" class="nav-card hubspot" id="link-hubspot">
        <div class="nav-card-icon">
          <img src="../assets/hubspot-logo.png" alt="HubSpot">
        </div>
        <div class="nav-card-title">HubSpot</div>
        <div class="nav-card-desc">Pipeline, etapas y leads por fuente</div>
      </a>
    </div>

    <div class="landing-footer">Harmonices &middot; Dashboard de Publicidad</div>
  </div>

  <script type="module">
    import { formatMonthFull } from '../shared/utils.js';

    const STORAGE_KEY = 'harmonices_selected_month';

    async function init() {
      let manifest;
      try {
        const res = await fetch('../data/harmonices/manifest.json');
        manifest = await res.json();
      } catch (e) { console.error('Could not load manifest:', e); return; }

      const selector = document.getElementById('month-selector');
      manifest.months.slice().reverse().forEach(m => {
        const opt = document.createElement('option');
        opt.value = m;
        opt.textContent = formatMonthFull(m);
        selector.appendChild(opt);
      });

      const urlParams = new URLSearchParams(window.location.search);
      const urlMonth = urlParams.get('month');
      const storedMonth = localStorage.getItem(STORAGE_KEY);
      const initialMonth = (urlMonth && manifest.months.includes(urlMonth)) ? urlMonth
                         : (storedMonth && manifest.months.includes(storedMonth)) ? storedMonth
                         : manifest.latestMonth;

      selector.value = initialMonth;
      localStorage.setItem(STORAGE_KEY, initialMonth);

      selector.addEventListener('change', () => {
        localStorage.setItem(STORAGE_KEY, selector.value);
        const url = new URL(window.location);
        url.searchParams.set('month', selector.value);
        history.replaceState(null, '', url);
      });

      function updateLinks() {
        const month = selector.value;
        document.querySelectorAll('.nav-card').forEach(a => {
          const base = a.getAttribute('href').split('?')[0];
          a.href = `${base}?month=${month}`;
        });
      }
      updateLinks();
      selector.addEventListener('change', updateLinks);
    }

    init();
  </script>
</body>
</html>
